[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "filetreekg"
version = "0.1.0"
description = "KGModule for file tree knowledge graphs"
authors = ["Flux Frontiers <dev@flux-frontiers.ai>"]
license = "MIT"
readme = "README.md"
repository = "https://github.com/flux-frontiers/FTreeKG"
packages = [{include = "filetreekg"}]
keywords = ["knowledge-graph", "filesystem", "semantic-search", "kgmodule"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]

[tool.poetry.dependencies]
python = ">3.12,<3.14"
code-kg = { git = "https://github.com/Flux-Frontiers/code_kg.git" }
doc-kg = { git = "https://github.com/Flux-Frontiers/doc_kg.git" }

[tool.poetry.group.dev.dependencies]
pytest = "^8.0.0"
pytest-cov = "^5.0.0"
black = ">=22.0"
ruff = ">=0.4.0"
mypy = ">=1.10.0"

[tool.poetry.group.kgrag.dependencies]
kg-rag = { path = "../kgrag", develop = true }

[tool.black]
line-length = 100
target-version = ["py312", "py313"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_ignores = true
disallow_untyped_defs = true
