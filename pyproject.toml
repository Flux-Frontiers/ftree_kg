[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "ftree-kg"
version = "0.4.0"
description = "KGModule for file tree knowledge graphs"
authors = ["Eric G. Suchanek, PhD <suchanek@mac.com>"]
license = "Elastic-2.0"
readme = "README.md"
repository = "https://github.com/flux-frontiers/FTreeKG"
packages = [{include = "ftree_kg", from = "src"}]
keywords = ["knowledge-graph", "filesystem", "semantic-search", "kgmodule"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]

[tool.poetry.scripts]
ftreekg           = "ftree_kg.cli:cli"
ftreekg-build     = "ftree_kg.cli.cmd_build:build"
ftreekg-query     = "ftree_kg.cli.cmd_query:query"
ftreekg-pack      = "ftree_kg.cli.cmd_query:pack"
ftreekg-analyze   = "ftree_kg.cli.cmd_analyze:analyze"
ftreekg-snapshot  = "ftree_kg.cli.cmd_snapshot:snapshot"

[tool.poetry.dependencies]
python = ">=3.12,<3.14"
click = "^8.1.0"


[tool.poetry.group.dev.dependencies]
pytest = "^8.0.0"
pytest-cov = "^5.0.0"
black = ">=22.0"
ruff = ">=0.4.0"
mypy = ">=1.10.0"
pycode-kg = { git = "https://github.com/Flux-Frontiers/pycode_kg.git"}
doc-kg = { git = "https://github.com/Flux-Frontiers/doc_kg.git"}


[tool.black]
line-length = 100
target-version = ["py312", "py313"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_ignores = true
disallow_untyped_defs = true

[[tool.mypy.overrides]]
module = ["pycode_kg.*", "kg_rag.*", "ftree_kg.*"]
ignore_missing_imports = true

[tool.pylint.MASTER]
ignored-modules = ["pycode_kg", "pycode_kg.module", "pycode_kg.module.types", "kg_rag", "kg_rag.adapters.base", "kg_rag.primitives", "click", "pytest"]

[tool.pylint."MESSAGES CONTROL"]
disable = [
    "too-many-arguments",
    "too-many-positional-arguments",
    "too-many-locals",
    "duplicate-code",
    "missing-function-docstring",
    "redefined-outer-name",
    "wrong-import-order",
    "import-outside-toplevel",
    "unused-argument",
    "redefined-builtin",
    "broad-exception-caught",
    "unspecified-encoding",
]

[tool.filetreekg]
# Directories to include in indexing (empty = include all)
include = ["src", "docs"]

# Directories to exclude at every depth (in addition to DEFAULT_SKIP_DIRS)
# exclude = ["archives", "backups"]

[tool.codekg]
# Directories to include in the knowledge graph build and analysis.
# When unset, all directories are indexed.
include = ["src"]

[tool.dockg]
# Exclude directories from the knowledge graph by default.
exclude = [".dockg", ".codekg", "src", ".git", ".venv", "venv", "__pycache__",
".mypy_cache", ".pytest_cache", "bundles", "dist"]
