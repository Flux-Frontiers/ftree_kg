[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "ftree-kg"
version = "0.2.0"
description = "KGModule for file tree knowledge graphs"
authors = ["Eric G. Suchanek, PhD <suchanek@mac.com>"]
license = "Elastic-2.0"
readme = "README.md"
repository = "https://github.com/flux-frontiers/FTreeKG"
packages = [{include = "src"}]
keywords = ["knowledge-graph", "filesystem", "semantic-search", "kgmodule"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]

[tool.poetry.scripts]
ftreekg           = "src.cli:cli"
ftreekg-build     = "src.cli.cmd_build:build"
ftreekg-query     = "src.cli.cmd_query:query"
ftreekg-pack      = "src.cli.cmd_query:pack"
ftreekg-analyze   = "src.cli.cmd_analyze:analyze"
ftreekg-snapshot  = "src.cli.cmd_snapshot:snapshot"

[tool.poetry.dependencies]
python = ">=3.12,<3.14"
click = "^8.1.0"
kg-rag = { git = "https://github.com/Flux-Frontiers/KGRAG.git", optional = true }
code-kg = { git = "https://github.com/Flux-Frontiers/code_kg.git", optional = true }
doc-kg = { git = "https://github.com/Flux-Frontiers/doc_kg.git", optional = true }

[tool.poetry.extras]
code-kg = ["code-kg"]
doc-kg = ["doc-kg"]
kgrag = ["kg-rag", "code-kg", "doc-kg"]

[tool.poetry.group.dev.dependencies]
pytest = "^8.0.0"
pytest-cov = "^5.0.0"
black = ">=22.0"
ruff = ">=0.4.0"
mypy = ">=1.10.0"


[tool.black]
line-length = 100
target-version = ["py312", "py313"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_ignores = true
disallow_untyped_defs = true

[tool.pylint.MASTER]
ignored-modules = ["code_kg", "code_kg.module", "code_kg.module.types", "kg_rag", "kg_rag.adapters.base", "kg_rag.primitives", "click", "pytest"]

[tool.pylint."MESSAGES CONTROL"]
disable = [
    "too-many-arguments",
    "too-many-positional-arguments",
    "too-many-locals",
    "duplicate-code",
    "missing-function-docstring",
    "redefined-outer-name",
    "wrong-import-order",
    "import-outside-toplevel",
    "unused-argument",
    "redefined-builtin",
    "broad-exception-caught",
    "unspecified-encoding",
]

[tool.filetreekg]
# Directories to include in indexing (empty = include all)
# include = ["src", "docs"]

# Directories to exclude at every depth (in addition to DEFAULT_SKIP_DIRS)
# exclude = ["archives", "backups"]
